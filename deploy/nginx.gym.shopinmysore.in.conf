server {
    listen 80;
    listen [::]:80;
    server_name gym.shopinmysore.in;

    root /var/www/gym.shopinmysore.in;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /data/ {
        add_header Cache-Control "no-cache";
    }

    # 404 error page handling
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Recommended if you do upload /admin/ but want it blocked publicly.
    # Remove this block only if you intentionally need public access.
    location /admin/ {
        deny all;
        return 403;
    }
}
